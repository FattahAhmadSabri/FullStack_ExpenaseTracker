<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <style>
      .top-right {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px; 
      }

      .top-right button {
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="top-right">
      <button onclick="handleDayByDayExpenses()" type="button">
        Day By Day Expense
      </button>

      <button onclick="handlepayments()" type="button">Buy Membership</button>
    </div>
    <form onsubmit="handleExpense(event)">
      <label>Amount :</label>
      <input type="number" id="amount" />
      <br />
      <label>Description :</label>
      <input type="text" id="description" />
      <br />

      <br />
      <button type="submit">Submit</button>
    </form>
    <button type="submit" id="leaderButton" onclick="handleLeaderboard()">
      Display Leader Board
    </button>
    <ul></ul>
    <label>Rows per page:</label>

<select id="limit">
  <option value="5">5</option>
  <option value="10">10</option>
  <option value="20">20</option>
  <option value="50">50</option>
</select>

<div id="pagination">
  <button onclick="changePage(-1)">Previous</button>
  <span id="pageNumber">Page 1</span>
  <button onclick="changePage(1)">Next</button>
</div>
    <h1>Leader Board</h1>

    <div id="leaderboard"></div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="expense.js"></script>
  </body>
</html>
