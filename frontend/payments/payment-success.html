<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Status</title>

    <link rel="stylesheet" href="payment-success.css" />
  </head>

      <div class="success-icon">✓</div>

      <h1>Payment Successful</h1>

      <p class="subtitle">Thank you for purchasing Premium Membership.</p>

      <div class="details">
        <div class="row">
          <span>Order ID</span>

        </div>

        <div class="row">
          <span>Status</span>
          <p id="status">Checking payment status...</p>
        </div>
      </div>

      <button onclick="window.location.href = '../expense/expense.html'">
        Go to Dashboard
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="payment-success.js"></script>

</html>
