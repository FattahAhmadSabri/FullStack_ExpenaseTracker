<!doctype html>
<html>
  <head>
    <title>Payment Success</title>
  </head>
  <body>
    <h2>Payment Successful</h2>

    <p id="orderId"></p>

    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id");

      document.getElementById("orderId").innerText = "Order ID: " + orderId;
    </script>
  </body>
</html>
