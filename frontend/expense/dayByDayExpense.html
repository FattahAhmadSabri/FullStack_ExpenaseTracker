<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Table</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }

      th {
        background-color: #4caf50;
        color: white;
      }

      tr:nth-child(even) {
        background-color: #f5f5f5;
      }

      tr:hover {
        background-color: #e9e9e9;
      }
    </style>
  </head>
  <body>
    <h2>Day By Day Expenses</h2>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Income</th>
          <th>Expense</th>
        </tr>
      </thead>

      <tbody id="expenseTableBody">
        <tr>
          <td>18-07-2026</td>
          <td>Salary</td>
          <td>Income</td>
          <td>₹50,000</td>
          <td>-</td>
        </tr>

        <tr>
          <td>18-07-2026</td>
          <td>Groceries</td>
          <td>Food</td>
          <td>-</td>
          <td>₹1,250</td>
        </tr>

        <tr>
          <td>18-07-2026</td>
          <td>Petrol</td>
          <td>Transport</td>
          <td>-</td>
          <td>₹900</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
